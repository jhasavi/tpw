name: Cleanup staging verification

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0' # weekly check (UTC)

jobs:
  verify-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: tpw-cleanup-staging
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Guard required staging secrets
        id: secrets
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STAGING_API_BASE: ${{ secrets.STAGING_API_BASE }}
        run: |
          if [ -z "$STAGING_DATABASE_URL" ] || [ -z "$STAGING_API_BASE" ]; then
            echo "Staging secrets are missing. Skipping scheduled verification."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install dependencies
        if: steps.secrets.outputs.skip != 'true'
        run: npm ci
      - name: Run verification migrations (non-destructive checks)
        if: steps.secrets.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          set -e
          for f in migrations/005_cleanup_legacy_columns.sql migrations/005_courses_cleanup.sql migrations/005_lessons_cleanup.sql; do
            if [ ! -f "$f" ]; then
              echo "Legacy migration $f not found — skipping (Next.js app no longer uses root migrations/)."
              exit 0
            fi
          done
          psql "$DATABASE_URL" -f migrations/005_cleanup_legacy_columns.sql
          psql "$DATABASE_URL" -f migrations/005_courses_cleanup.sql
          psql "$DATABASE_URL" -f migrations/005_lessons_cleanup.sql
      - name: Run smoke curl script
        if: steps.secrets.outputs.skip != 'true'
        env:
          API_BASE: ${{ secrets.STAGING_API_BASE }}
        run: |
          if [ -f scripts/run_smoke.sh ]; then
            bash scripts/run_smoke.sh "$API_BASE" || echo "Smoke script reported failures; non-blocking."
          else
            echo "scripts/run_smoke.sh not found — skipping."
          fi
